name: Release Packages

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "EXT_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Resolved version: ${VERSION}"

      - name: Build release image
        run: |
          build_args=()
          if [[ -n "${DEBIAN_MIRROR:-}" ]]; then
            build_args+=(--build-arg "DEBIAN_MIRROR=$DEBIAN_MIRROR")
          fi
          if [[ -n "${DEBIAN_SECURITY_MIRROR:-}" ]]; then
            build_args+=(--build-arg "DEBIAN_SECURITY_MIRROR=$DEBIAN_SECURITY_MIRROR")
          fi
          if [[ -n "${PGDG_MIRROR:-}" ]]; then
            build_args+=(--build-arg "PGDG_MIRROR=$PGDG_MIRROR")
          fi
          if [[ -n "${RUSTUP_DIST_SERVER:-}" ]]; then
            build_args+=(--build-arg "RUSTUP_DIST_SERVER=$RUSTUP_DIST_SERVER")
          fi
          if [[ -n "${RUSTUP_UPDATE_ROOT:-}" ]]; then
            build_args+=(--build-arg "RUSTUP_UPDATE_ROOT=$RUSTUP_UPDATE_ROOT")
          fi
          if [[ -n "${CARGO_REGISTRIES_CRATES_IO_INDEX:-}" ]]; then
            build_args+=(--build-arg "CARGO_REGISTRIES_CRATES_IO_INDEX=$CARGO_REGISTRIES_CRATES_IO_INDEX")
          fi

          docker build \
            "${build_args[@]}" \
            -f docker/Dockerfile.release-trixie \
            -t pg-eviltransform-release:ci \
            .

      - name: Build DEB packages (PG14-18 stable)
        run: |
          mkdir -p dist
          docker run --rm \
            --user root \
            -e EXT_VERSION="${EXT_VERSION}" \
            -e OUT_DIR=/out \
            -v "$GITHUB_WORKSPACE:/work" \
            -v "$GITHUB_WORKSPACE/dist:/out" \
            --entrypoint /bin/bash \
            pg-eviltransform-release:ci \
            -lc 'set -euo pipefail; ls -l /work/scripts; bash /work/scripts/package_debs.sh'

      - name: Install FPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Build RPM packages from DEBs
        run: |
          EXT_VERSION="${EXT_VERSION}" OUT_DIR="$GITHUB_WORKSPACE/dist" scripts/package_rpms.sh

      - name: List artifacts
        run: ls -lah dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ env.TAG_NAME }}-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm

  publish-release:
    runs-on: ubuntu-24.04
    needs: build-packages
    permissions:
      contents: write
    steps:
      - name: Resolve tag name
        run: echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-packages-${{ env.TAG_NAME }}-*
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lah dist

      - name: Publish assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          make_latest: true
          files: |
            dist/*.deb
            dist/*.rpm
